<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { width: 400px; height: 400px; }
</style>
</head>
<body>
<canvas id="splash" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('splash');
const ctx = c.getContext('2d');
const W = 1024;
const CX = W/2, CY = W/2;

// Background
ctx.fillStyle = '#000000';
ctx.fillRect(0, 0, W, W);

// Subtle radial glow
const glow = ctx.createRadialGradient(CX, CY-30, 0, CX, CY, 400);
glow.addColorStop(0, 'rgba(190, 242, 100, 0.10)');
glow.addColorStop(0.5, 'rgba(190, 242, 100, 0.02)');
glow.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, W, W);

// === RUNNER (centered, larger) ===
ctx.save();
ctx.translate(CX + 10, CY - 40);
ctx.rotate(-0.08);

const lime = '#bef264';
const limeDark = '#9fcc3a';

function drawLimb(x1, y1, x2, y2, width, color) {
  ctx.beginPath();
  ctx.lineCap = 'round';
  ctx.lineWidth = width;
  ctx.strokeStyle = color;
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function drawCurvedLimb(x1, y1, cx, cy, x2, y2, width, color) {
  ctx.beginPath();
  ctx.lineCap = 'round';
  ctx.lineWidth = width;
  ctx.strokeStyle = color;
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cx, cy, x2, y2);
  ctx.stroke();
}

// Scale up runner
const s = 1.3;
ctx.scale(s, s);

drawCurvedLimb(-15, 75, -80, 130, -120, 190, 38, limeDark);
drawLimb(-120, 190, -150, 185, 28, limeDark);
drawCurvedLimb(15, 75, 60, 150, 110, 210, 38, lime);
drawLimb(110, 210, 140, 215, 28, lime);

ctx.beginPath();
ctx.ellipse(0, 10, 45, 80, -0.1, 0, Math.PI * 2);
ctx.fillStyle = lime;
ctx.fill();

drawCurvedLimb(-20, -30, -50, 10, -90, -20, 30, limeDark);
drawCurvedLimb(20, -30, 60, -60, 90, -100, 30, lime);

ctx.beginPath();
ctx.arc(5, -100, 48, 0, Math.PI * 2);
ctx.fillStyle = lime;
ctx.fill();

ctx.beginPath();
ctx.arc(-5, -110, 20, 0, Math.PI * 2);
ctx.fillStyle = 'rgba(255,255,255,0.12)';
ctx.fill();

ctx.restore();

// Motion trails
for (let i = 0; i < 5; i++) {
  ctx.beginPath();
  const y = CY - 200 + i * 55;
  const x = CX - 270 + i * 10;
  const len = 40 + i * 18;
  ctx.moveTo(x, y);
  ctx.lineTo(x + len, y);
  ctx.strokeStyle = `rgba(190, 242, 100, ${0.05 + i*0.03})`;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// Save via server
(async function() {
  const dataUrl = c.toDataURL('image/png');
  await fetch('/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: 'splash-image.png', data: dataUrl })
  });
  console.log('Splash saved!');
})();
</script>
</body>
</html>
